<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Midsummer Night's Dream — Donkey Headdress Preview</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e8e0d8;
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    text-align: center;
    padding: 32px 24px 16px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 5vw, 42px);
    font-weight: 400;
    letter-spacing: 0.02em;
    color: #f0e6d8;
    margin-bottom: 6px;
  }

  header h1 em {
    font-style: italic;
    color: #c8a87a;
  }

  header .subtitle {
    font-size: clamp(13px, 2.5vw, 16px);
    color: #8a7e72;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .main-content {
    flex: 1;
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 24px;
    padding: 0 24px 16px;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
  }

  .concept-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    max-width: 340px;
  }

  .concept-panel .label {
    font-size: 12px;
    color: #6a6058;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    font-weight: 500;
  }

  .concept-panel img {
    width: 100%;
    max-width: 320px;
    border-radius: 10px;
    border: 1px solid #2a2420;
    object-fit: contain;
  }

  .viewer-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 0;
  }

  .viewer-panel .label {
    font-size: 12px;
    color: #6a6058;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    font-weight: 500;
  }

  model-viewer {
    width: 100%;
    height: 70vh;
    max-height: 700px;
    border-radius: 12px;
    background: radial-gradient(ellipse at center, #1a1714 0%, #0a0908 70%);
    --poster-color: transparent;
  }

  model-viewer::part(default-progress-bar) {
    background: #c8a87a;
  }

  .arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    padding: 0 4px;
  }

  .arrow svg {
    width: 40px;
    height: 40px;
    opacity: 0.25;
  }

  .info-bar {
    text-align: center;
    padding: 16px 24px 32px;
  }

  .info-bar p {
    font-size: 14px;
    color: #6a6058;
    line-height: 1.6;
  }

  .info-bar .hint {
    font-size: 12px;
    color: #4a443e;
    margin-top: 8px;
  }

  .credit {
    font-size: 11px;
    color: #3a3530;
    text-align: center;
    padding: 0 24px 16px;
  }

  /* Stack vertically on smaller screens */
  @media (max-width: 900px) {
    .main-content {
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .concept-panel {
      max-width: 280px;
    }
    .concept-panel img {
      max-width: 260px;
    }
    .arrow {
      transform: rotate(90deg);
      padding: 0;
    }
    model-viewer {
      height: 55vh;
      border-radius: 8px;
    }
    header { padding: 24px 16px 12px; }
    .info-bar { padding: 12px 16px 24px; }
  }
</style>
</head>
<body>

<header>
  <h1>Donkey Headdress — <em>A Midsummer Night's Dream</em></h1>
  <div class="subtitle">3D Form Preview &bull; Pocket Opera</div>
</header>

<div class="main-content">
  <div class="concept-panel">
    <div class="label">Concept</div>
    <img src="concept.png" alt="Original charred bark concept art for the donkey headdress">
  </div>

  <div class="arrow">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 20h20m0 0l-7-7m7 7l-7 7" stroke="#c8a87a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="viewer-panel">
    <div class="label">3D Model</div>
    <model-viewer
      id="main-viewer"
      src="mask.glb"
      camera-controls
      touch-action="pan-y"
      shadow-intensity="0.8"
      environment-image="neutral"
      shadow-softness="1"
      exposure="0.7"
      tone-mapping="commerce"
      camera-orbit="30deg 75deg 2.2m"
      min-camera-orbit="auto auto 1m"
      max-camera-orbit="auto auto 5m"
      auto-rotate
      auto-rotate-delay="3000"
      rotation-per-second="12deg"
      interaction-prompt="auto"
      ar
      ar-modes="webxr scene-viewer quick-look"
      alt="3D preview of charred bark donkey headdress for A Midsummer Night's Dream"
    ></model-viewer>
  </div>
</div>

<div class="info-bar">
  <p>Drag to orbit &bull; Pinch or scroll to zoom &bull; Two-finger drag to pan</p>
  <p class="hint">Auto-rotation pauses when you interact, resumes after 3 seconds</p>
</div>

<div class="credit">
  Direction: Nicolas Aliaga &bull; Design & fabrication: Chris Cuzelac
</div>

</body>
</html>
